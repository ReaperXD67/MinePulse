name: MinePulseBridge
main: com.minepulse.bridge.MinePulseBridgePlugin
version: 0.3.1
api-version: "1.20"
author: MinePulse
description: Verified playtime rewards and purchase delivery bridge for MinePulse.
commands:
  answer:
    description: Answer a website-verified MinePulse activity check.
    usage: /answer <value>
  mpcode:
    description: Backward-compatible alias for /answer.
    usage: /mpcode <value>
  points:
    description: Show your MinePulse wallet and verified session rewards.
  pool:
    description: Show this server's MinePulse campaign pool and reward rate.
  minepulse:
    description: Show MinePulse statistics, link an account, or open command help.
    usage: /minepulse [pool|help|link <code>]
permissions:
  minepulse.admin:
    description: Allows administrative MinePulse diagnostics.
    default: op
