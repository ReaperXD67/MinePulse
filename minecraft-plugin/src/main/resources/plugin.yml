name: KarixMCBridge
main: com.minepulse.bridge.MinePulseBridgePlugin
version: 0.5.1
api-version: "1.20"
author: KarixMC
description: Verified playtime rewards and purchase delivery bridge for KarixMC.
commands:
  answer:
    description: Answer a website-verified KarixMC activity check.
    usage: /answer <value>
  mpcode:
    description: Backward-compatible alias for /answer.
    usage: /mpcode <value>
  points:
    description: Show your KarixMC wallet and verified session rewards.
  pool:
    description: Show this server's KarixMC campaign pool and reward rate.
  receive:
    description: Retry queued KarixMC store item deliveries for your account.
  karixmc:
    description: Show KarixMC statistics, link an account, or open command help.
    usage: /karixmc [pool|help|receive|link <code>]
  minepulse:
    description: Backward-compatible alias for /karixmc.
    usage: /minepulse [pool|help|receive|link <code>]
permissions:
  karixmc.admin:
    description: Allows administrative KarixMC diagnostics.
    default: op
  minepulse.admin:
    description: Backward-compatible administrative permission.
    default: op
